# Manuell auslösbarer GitHub-Pages-Deploy.
# Voraussetzung: Repo ist öffentlich (oder GitHub Pro) — Pages wird beim
# ersten Lauf automatisch aktiviert (enablement: true).
# Start: GitHub → Actions → "Deploy GitHub Pages" → "Run workflow".
name: Deploy GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          # Pages liefert unter /<repo-name>/ aus — Vite & Router folgen diesem Pfad.
          BASE_PATH: /${{ github.event.repository.name }}/

      # SPA-Fallback: Deep-Links wie /leistungen funktionieren auch bei Reload.
      - run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
