[build]
  command = "npm run build"
  publish = "dist"

# Die Prerender-Ausgabe nutzt route.html; Netlifys Pretty-URL-Verarbeitung
# liefert diese unter /route ohne Dateiendung und ohne Verzeichnis-Slash aus.
[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true

# Legacy-Pfade werden wie auf Vercel permanent auf genau ein kanonisches Ziel
# geführt. Netlify normalisiert die Quellpfade vor dem Regelabgleich.
[[redirects]]
  from = "/unterhaltsreinigung"
  to = "/leistungen/unterhaltsreinigung"
  status = 301
  force = true

