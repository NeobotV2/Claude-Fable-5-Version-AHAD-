# npm run build = Client-Build + SSR-Prerender → jede Route als statisches HTML
# (Inhalt, OG-Tags, JSON-LD im ausgelieferten HTML, kein leeres root mehr).
[build]
  command = "npm run build"
  publish = "dist"

# Fallback nur für Pfade ohne vorgerenderte Datei (Netlife prüft Dateien zuerst).
# Prerenderte Routen (z. B. /kostenrechner/index.html) werden direkt ausgeliefert.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
